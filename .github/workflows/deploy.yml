name: Deploy to Vercel

on:
  push:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Debug env file format
        run: |
          echo "=== File exists check ==="
          ls -la .vercel/.env.production.local
          echo "=== Number of lines ==="
          wc -l .vercel/.env.production.local
          echo "=== Var names only (no values) ==="
          grep -oP '^[^=]+' .vercel/.env.production.local || cut -d'=' -f1 .vercel/.env.production.local
          echo "=== Check if NEXT_PUBLIC vars present ==="
          grep -c "NEXT_PUBLIC" .vercel/.env.production.local

      - name: Copy env to root
        run: cp .vercel/.env.production.local .env.production.local

      - run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
